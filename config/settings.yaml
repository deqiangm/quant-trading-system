# 量化交易系统配置文件
# Generated: 2026-04-14

# 数据源配置
data:
  source: yfinance
  default_symbol: AAPL
  default_start_date: "2024-01-01"
  default_end_date: "2024-12-31"
  
# 回测配置
backtest:
  initial_cash: 100000
  commission: 0.001  # 0.1% 手续费
  slippage: 0.0
  
# 策略默认参数
strategies:
  sma_cross:
    fast_period: 10
    slow_period: 20
    
# 输出配置
output:
  log_dir: logs/
  results_dir: results/
  plot_enabled: true
